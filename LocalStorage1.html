<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Object Storing on Local Storage</h1>

    <script>
        let user ={
            userName: "Vishal",
            userAge : 22
        }

        localStorage.setItem("User", JSON.stringify(user));

        let getUserData =JSON.parse(localStorage.getItem("User"));
        console.log(getUserData, typeof(getUserData));
    </script>
    
</body>
</html>
